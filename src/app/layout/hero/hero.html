<div class="tc-hero-section uk-section uk-section-xlarge uk-padding-remove-bottom">
    <div class="uk-container">
        <div class="uk-grid-large uk-flex-middle" uk-grid>
            <div class="uk-width-1-2@m">
                <div class="tc-hero-content" uk-scrollspy="cls: uk-animation-slide-left-small; delay: 100">
                    <span class="tc-badge">About Us</span>
                    <h1 class="tc-hero-title" [innerHTML]="'HERO_TITLE' | translate"></h1>
                    <div class="tc-hero-desc">
                        <p>{{ 'HERO_DESC' | translate }}</p>
                    </div>
                    <div class="tc-hero-actions">
                        <a href="#" class="uk-button tc-btn-primary">{{ 'BTN_EXPLORE' | translate }}</a>
                        <a href="#" class="uk-button tc-btn-secondary">{{ 'BTN_SERVICES' | translate }}</a>
                    </div>
                </div>
            </div>
            <div class="uk-width-1-2@m">
                <div class="tc-hero-image" uk-scrollspy="cls: uk-animation-fade; delay: 300">
                    <div class="map-container">
                        <img src="telcablesSA.png" alt="Tel Cables Network Map" class="floating-img">
                        <div class="map-overlay-glow"></div>
                    </div>
                </div>
            </div>
        </div>

        <div *ngIf="settings().showStatsCounter" class="tc-hero-stats-row uk-margin-xlarge-top" uk-scrollspy="cls: uk-animation-slide-bottom-small; delay: 500">
            <div class="uk-grid-large uk-child-width-1-2 uk-child-width-1-3@s uk-child-width-1-5@m uk-flex-center uk-text-center" uk-grid>
                <div>
                    <div class="stat-value" data-count="4">0</div>
                    <div class="stat-label">Continents</div>
                </div>
                <div>
                    <div class="stat-value" data-count="45">+0</div>
                    <div class="stat-label">Connected IXPs</div>
                </div>
                <div>
                    <div class="stat-value" data-count="30">+0</div>
                    <div class="stat-label">PoPs</div>
                </div>
                <div>
                    <div class="stat-value" data-count="930">+0</div>
                    <div class="stat-label">Interconnected Data Centers</div>
                </div>
                <div>
                    <div class="stat-value" data-count="6000">+0</div>
                    <div class="stat-label">Peering Agreements</div>
                </div>
            </div>
        </div>
    </div>
</div>
