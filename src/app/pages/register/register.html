<div class="register-container">
  <a routerLink="/home" class="back-home-link">
    <i uk-icon="arrow-left"></i> Voltar ao início
  </a>
  <div class="register-card">
    <div class="register-header">
      <div class="logo">
        <span class="logo-text">TEL <span class="highlight">CABLES</span></span>
      </div>
      <h1>Criar Conta</h1>
      <p>Junte-se à TCSA e comece a gerir os seus serviços de conectividade global.</p>
    </div>

    <form class="register-form" (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <div class="form-group">
        <label for="name">Nome Completo</label>
        <div class="input-wrapper">
          <i class="input-icon" uk-icon="user"></i>
          <input type="text" id="name" name="name" [(ngModel)]="formData.name" placeholder="Ex: João Silva" required>
        </div>
      </div>

      <div class="form-group">
        <label for="email">E-mail Corporativo</label>
        <div class="input-wrapper">
          <i class="input-icon" uk-icon="mail"></i>
          <input type="email" id="email" name="email" [(ngModel)]="formData.email" placeholder="exemplo@empresa.co.za" required>
        </div>
      </div>

      <div class="uk-grid-small uk-child-width-1-2@s" uk-grid>
        <div class="form-group">
          <label for="password">Palavra-passe</label>
          <div class="input-wrapper">
            <i class="input-icon" uk-icon="lock"></i>
            <input type="password" id="password" name="password" [(ngModel)]="formData.password" placeholder="••••••••" required minlength="8">
          </div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirmar</label>
          <div class="input-wrapper">
            <i class="input-icon" uk-icon="lock"></i>
            <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="formData.confirmPassword" placeholder="••••••••" required>
          </div>
        </div>
      </div>

      <div class="form-options">
        <label class="terms">
          <input type="checkbox" name="terms" [(ngModel)]="formData.terms" required> Aceito os <a href="#">Termos e Condições</a>
        </label>
      </div>

      <button type="submit" class="register-btn" [disabled]="!registerForm.form.valid || formData.password !== formData.confirmPassword || isLoading">
        <span *ngIf="!isLoading">Criar Conta <span class="uk-margin-small-left" uk-icon="arrow-right"></span></span>
        <span *ngIf="isLoading" uk-spinner="ratio: 0.8"></span>
      </button>
    </form>

    <div class="register-footer">
      <p>Já tem uma conta? <a routerLink="/login">Faça Login</a></p>
    </div>
  </div>
</div>
