<div class="forgot-password-container">
  <div class="forgot-password-card">
    <div class="forgot-password-header">
      <div class="logo">
        <span class="logo-text">TEL <span class="highlight">CABLES</span></span>
      </div>
      <h1>Recuperar Senha</h1>
      <p *ngIf="!isSubmitted">Introduza o seu e-mail e enviaremos as instruções para redefinir a sua senha.</p>
    </div>

    <div *ngIf="isSubmitted" class="success-message" uk-scrollspy="cls: uk-animation-scale-up">
      <div class="success-icon">
        <i uk-icon="icon: check; ratio: 2"></i>
      </div>
      <h3>E-mail Enviado!</h3>
      <p>Verifique a sua caixa de entrada ({{ email }}) para continuar o processo.</p>
      <button class="forgot-password-btn" routerLink="/login">Voltar ao Login</button>
    </div>

    <form *ngIf="!isSubmitted" class="forgot-password-form" (ngSubmit)="onSubmit()" #forgotForm="ngForm">
      <div class="form-group">
        <label for="email">E-mail</label>
        <div class="input-wrapper">
          <i class="input-icon" uk-icon="mail"></i>
          <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="exemplo@empresa.co.za" required>
        </div>
      </div>

      <button type="submit" class="forgot-password-btn" [disabled]="!forgotForm.form.valid">
        Enviar Instruções <span class="uk-margin-small-left" uk-icon="mail"></span>
      </button>
    </form>

    <div *ngIf="!isSubmitted" class="forgot-password-footer">
      <p>Lembrou-se da senha? <a routerLink="/login">Voltar ao Login</a></p>
    </div>
  </div>
</div>
